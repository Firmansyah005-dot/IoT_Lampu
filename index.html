<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Sensor Lux - IoTku</title>
    <!-- Menggunakan Tailwind CSS via CDN agar tampilan modern & responsif di HP -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-blue-600 text-white text-center py-4 shadow-md">
        <h1 class="text-xl font-bold tracking-wide">SMART LIGHTING DASHBOARD</h1>
        <p class="text-xs opacity-80">Monitoring Real-time via IoTku.org</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto w-full p-4 flex-grow flex flex-col justify-center gap-6">
        
        <!-- Card Sensor -->
        <div class="bg-white rounded-2xl shadow-xl p-6 text-center border border-slate-200 transition-all">
            <h2 class="text-gray-500 font-medium text-sm tracking-wider uppercase mb-2">Intensitas Cahaya</h2>
            
            <!-- Angka Lux -->
            <div class="flex items-center justify-center gap-2 my-4">
                <span id="lux-value" class="text-6xl font-black text-slate-800 transition-all duration-300">0</span>
                <span class="text-2xl font-bold text-gray-400">Lux</span>
            </div>

            <!-- Status Koneksi Indikator -->
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-full text-xs font-semibold mt-2">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="status-text" class="text-gray-600">Menghubungkan...</span>
            </div>
        </div>

        <!-- Info Card Tambahan -->
        <div class="bg-white rounded-xl p-4 shadow-sm text-xs text-gray-500 space-y-2">
            <div class="flex justify-between">
                <span>ID Sensor:</span>
                <span class="font-mono font-bold text-slate-700">00387</span>
            </div>
            <div class="flex justify-between">
                <span>Waktu Update Terakhir:</span>
                <span id="last-update" class="font-medium text-slate-700">-</span>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-3 text-gray-400 text-xs">
        &copy; 2026 Prototipe IoT. All Rights Reserved.
    </footer>

    <!-- Logika Koneksi Websocket Client ke IoTku -->
    <script>
        const luxValueEl = document.getElementById('lux-value');
        const statusDotEl = document.getElementById('status-dot');
        const statusTextEl = document.getElementById('status-text');
        const lastUpdateEl = document.getElementById('last-update');

        // Parameter sesuai dengan data di akun iotku.org milikmu
        const idSensor = "00387"; 
        const passkey = "0987654"; 
        
        // Membuka koneksi WebSocket ke Server IoTku untuk mendengarkan data masuk secara real-time
        const socketUrl = `wss://iotku.org/?idsensor=${idSensor}&passkey=${passkey}`;
        let socket;

        function connectWebSocket() {
            socket = new WebSocket(socketUrl);

            socket.onopen = function(e) {
                statusDotEl.className = "w-2.5 h-2.5 rounded-full bg-green-500";
                statusTextEl.innerText = "Terhubung (Real-time)";
                statusTextEl.className = "text-green-600";
            };

            socket.onmessage = function(event) {
                const dataData = event.data;
                
                // Cek apakah data murni angka atau format lain
                if (!isNaN(dataData)) {
                    luxValueEl.innerText = dataData;
                    
                    // Efek visual warna berubah tergantung gelap/terang
                    const luxInt = parseInt(dataData);
                    if (luxInt < 100) {
                        luxValueEl.className = "text-6xl font-black text-blue-600 transition-all"; // Gelap
                    } else {
                        luxValueEl.className = "text-6xl font-black text-amber-500 transition-all"; // Terang
                    }
                } else {
                    // Jika ada text perintah seperti AUTO/MANUAL/ON/OFF masuk dari control web
                    console.log("Pesan sistem:", dataData);
                }

                // Perbarui waktu update terakhir
                const sekarang = new Date();
                lastUpdateEl.innerText = sekarang.toLocaleTimeString('id-ID');
            };

            socket.onclose = function(e) {
                statusDotEl.className = "w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse";
                statusTextEl.innerText = "Terputus. Mencoba menghubungkan kembali...";
                statusTextEl.className = "text-red-500";
                // Auto reconnect dalam 5 detik jika putus
                setTimeout(connectWebSocket, 5000);
            };

            socket.onerror = function(err) {
                console.error("WebSocket Error: ", err);
                socket.close();
            };
        }

        // Jalankan koneksi saat halaman web dimuat
        connectWebSocket();
    </script>
</body>
</html>

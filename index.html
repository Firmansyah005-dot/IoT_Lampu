<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoTku - Kontrol Lampu Realtime</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --primary: #4ea8de;
            --success: #04d361;
            --danger: #e33d3d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #fff;
        }

        .status-koneksi {
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .terhubung { color: var(--success); }
        .terputus { color: var(--danger); }

        .widget {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .widget-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8f8f9d;
            margin-bottom: 10px;
        }

        .value {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
        }

        .unit {
            font-size: 20px;
            font-weight: normal;
            color: #8f8f9d;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #29292e;
            color: #fff;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-active-mode {
            background-color: var(--primary);
            color: #000;
        }

        .btn-on { background-color: var(--success); color: #000; }
        .btn-off { background-color: var(--danger); color: #fff; }
        
        button:disabled {
            background-color: #1f1f23;
            color: #55555a;
            cursor: not-allowed;
            transform: none;
        }

        .log-panel {
            background: #09090a;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            max-height: 100px;
            overflow-y: auto;
            color: #a8a8b3;
            border: 1px solid #29292e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IoTku Lamp Controller</h2>
    <div id="statusKoneksi" class="status-koneksi terputus">Menghubungkan ke IoTku...</div>

    <div class="widget">
        <div class="widget-title">Intensitas Cahaya</div>
        <div class="value"><span id="luxVal">0</span> <span class="unit">Lux</span></div>
    </div>

    <div class="widget">
        <div class="widget-title">Mode Operasi</div>
        <div class="btn-group">
            <button id="btnAuto" onclick="setMode('AUTO')">OTOMATIS</button>
            <button id="btnManual" onclick="setMode('MANUAL')">MANUAL</button>
        </div>
    </div>

    <div class="widget">
        <div class="widget-title">Sakelar Lampu (Manual)</div>
        <div class="btn-group">
            <button id="btnOn" onclick="sendControl('ON')" disabled>ON</button>
            <button id="btnOff" onclick="sendControl('OFF')" disabled>OFF</button>
        </div>
    </div>

    <div class="widget-title" style="font-size: 11px; margin-bottom: 5px;">Live Log Data</div>
    <div id="logPanel" class="log-panel">Sistem siap...</div>
</div>

<script>
    // Konfigurasi ID dari file INO
    var idLampu = "00387";
    var passkey = "1122334455";
    
    // Format string standar tanpa backtick untuk menghindari SyntaxError di beberapa browser
    var wsUrl = "wss://iotku.org:443/?idsensor=" + idLampu + "&passkey=" + passkey;

    var socket;
    var currentMode = "AUTO";

    var statusKoneksi = document.getElementById('statusKoneksi');
    var luxVal = document.getElementById('luxVal');
    var btnAuto = document.getElementById('btnAuto');
    var btnManual = document.getElementById('btnManual');
    var btnOn = document.getElementById('btnOn');
    var btnOff = document.getElementById('btnOff');
    var logPanel = document.getElementById('logPanel');

    function cetakLog(pesan) {
        var waktu = new Date().toLocaleTimeString();
        logPanel.innerHTML += "[" + waktu + "] " + pesan + "<br>";
        logPanel.scrollTop = logPanel.scrollHeight;
    }

    function inisialisasiWebSocket() {
        cetakLog("Mencoba menyambung ke server...");
        try {
            socket = new WebSocket(wsUrl);

            socket.onopen = function() {
                statusKoneksi.innerText = "Terhubung ke iotku.org";
                statusKoneksi.className = "status-koneksi terhubung";
                cetakLog("Koneksi WebSocket Berhasil Terbuka.");
                updateUI();
            };

            socket.onmessage = function(event) {
                var dataMasuk = event.data;
                
                if (dataMasuk.indexOf('{') === 0) {
                    try {
                        var parsed = JSON.parse(dataMasuk);
                        if(parsed.lux !== undefined) {
                            luxVal.innerText = parsed.lux;
                            cetakLog("Menerima data: " + parsed.lux + " Lux");
                        }
                    } catch(e) {
                        console.error("Gagal parse JSON:", e);
                    }
                } else {
                    cetakLog("Pesan masuk: " + dataMasuk);
                    if (dataMasuk.indexOf("AUTO") >= 0) {
                        currentMode = "AUTO";
                        updateUI();
                    } else if (dataMasuk.indexOf("MANUAL") >= 0) {
                        currentMode = "MANUAL";
                        updateUI();
                    }
                }
            };

            socket.onclose = function() {
                statusKoneksi.innerText = "Terputus! Menghubungkan kembali...";
                statusKoneksi.className = "status-koneksi terputus";
                cetakLog("Koneksi terputus. Mencoba hubung ulang dalam 5 detik...");
                setTimeout(inisialisasiWebSocket, 5000);
            };

            socket.onerror = function(err) {
                cetakLog("Error jaringan WebSocket terdeteksi.");
            };
        } catch (error) {
            cetakLog("Gagal inisialisasi: " + error.message);
        }
    }

    function setMode(mode) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(mode);
            currentMode = mode;
            cetakLog("Mengubah mode ke: " + mode);
            updateUI();
        } else {
            alert("Tidak terhubung ke server.");
        }
    }

    function sendControl(command) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            if (currentMode === "MANUAL") {
                socket.send(command);
                cetakLog("Kirim perintah sakelar: " + command);
            }
        } else {
            alert("Tidak terhubung ke server.");
        }
    }

    function updateUI() {
        if (currentMode === "AUTO") {
            btnAuto.className = "btn-active-mode";
            btnManual.className = "";
            btnOn.disabled = true;
            btnOff.disabled = true;
        } else {
            btnAuto.className = "";
            btnManual.className = "btn-active-mode";
            btnOn.disabled = false;
            btnOff.disabled = false;
        }
    }

    // Eksekusi otomatis
    window.onload = inisialisasiWebSocket;
</script>

</body>
</html>
